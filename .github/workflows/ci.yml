name: CI

on:
  pull_request:
  push:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install .[dev] ruff mypy pytest-json-report

      - name: Ruff
        run: ruff check . --output-format=json > ruff.json
        continue-on-error: true

      - name: Mypy
        run: mypy . --show-error-codes > mypy.txt
        continue-on-error: true

      - name: Pytest
        run: pytest --json-report --json-report-file=pytest.json
        continue-on-error: true

      - name: Upload analysis artifact
        uses: actions/upload-artifact@v4
        with:
          name: codementor-analysis
          path: |
            ruff.json
            mypy.txt
            pytest.json
